<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Karya - Nama Pondok</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* CSS KHUSUS UPLOAD (NAMESPACE UNIK uk-) */
        /* --- BAGIAN YANG DIUBAH --- */
        .uk-section-wrapper {
            padding: 80px 20px;
            /* Ganti gambar di bawah ini dengan path gambar lu, misal static/bg-pondok.jpg */
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.5)), 
                        url('static/upload.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Biar keren pas di scroll gambarnya diem */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- TAMBAHAN BIAR FORM LEBIH JELAS DI ATAS GAMBAR --- */
        .uk-form-container {
            background: rgba(0, 77, 64, 0.5); /* Naikin opasitas biar teks input gak tembus */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .uk-title { color: #fff; font-size: 2rem; margin-bottom: 10px; text-align: center; }
        .uk-subtitle { color: #c6d0df; text-align: center; margin-bottom: 30px; }
        .uk-input-group { margin-bottom: 20px; }
        .uk-input-group label { display: block; color: #e2e8f0; margin-bottom: 8px; font-weight: 500; }
        .uk-input-group input, .uk-input-group select, .uk-input-group textarea {
            width: 100%; padding: 12px 15px; background: rgb(5, 150, 105, 0.3);
            border: 1px solid rgb(255, 255, 255, 0.45); border-radius: 8px; color: #fff;
        }
        .uk-flex-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .uk-btn-otp {
            background: #059669; color: white; border: none; padding: 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
        }
        .uk-otp-box { margin-top: 30px; padding-top: 25px; border-top: 1px dashed #334155; display: none; }
        .uk-btn-submit {
            background: #b38f00; color: white; width: 100%; padding: 15px;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        @media (max-width: 600px) { .uk-flex-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="loader-wrapper">
        <div class="loader-content">
            <img src="static/logo.png" alt="Logo" class="loader-logo-modern">
            <div class="loader-text">NAMA PONDOK</div>
        </div>
        <div class="loader-section section-left"></div>
        <div class="loader-section section-right"></div>
    </div>

    <header>
        <nav class="container nav-mobile-wrapper">
            <div class="logo"><img src="static/logo.png" alt="Logo"></div>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="pendidikan.html">Pendidikan</a></li>
                <li><a href="pendaftaran.html">Pendaftaran</a></li>
            </ul>
        </nav>
    </header>

    <div class="uk-section-wrapper">
        <div class="uk-form-container">
            <h2 class="uk-title"><i class="fas fa-file-upload"></i> Upload Karya Santri</h2>
            <p class="uk-subtitle">Gunakan form ini untuk mengirim artikel ke Mingguan Menulis.</p>
            
            <form id="uk-main-form">
                <div class="uk-input-group">
                    <label>Nama Penulis</label>
                    <input type="text" name="penulis" id="uk-penulis" required>
                </div>
                <div class="uk-flex-row">
                    <div class="uk-input-group">
                        <label>Kategori</label>
                        <select name="kategori" id="uk-kategori" required>
                            <option value="Opini">Opini</option>
                            <option value="Sastra">Sastra</option>
                            <option value="Berita">Berita</option>
                            <option value="Fikih">Fikih</option>
                        </select>
                    </div>
                    <div class="uk-input-group">
                        <label>Link Foto (URL)</label>
                        <input type="url" name="gambar" id="uk-gambar" required>
                    </div>
                </div>
                <div class="uk-input-group">
                    <label>Judul Artikel</label>
                    <input type="text" name="judul" id="uk-judul" required>
                </div>
                <div class="uk-input-group">
                    <label>Ringkasan</label>
                    <textarea name="ringkasan" id="uk-ringkasan" rows="2" required></textarea>
                </div>
                <div class="uk-input-group">
                    <label>Isi Artikel (Gunakan &lt;p&gt; untuk paragraf)</label>
                    <textarea name="isi" id="uk-isi" rows="8" required></textarea>
                </div>

                <button type="button" id="uk-btn-get-otp" class="uk-btn-otp">
                    <i class="fab fa-telegram-plane"></i> Minta Kode OTP dari Admin
                </button>

                <div id="uk-otp-section" class="uk-otp-box">
                    <div class="uk-input-group">
                        <label style="color: #ffcc00;">Masukkan 6 Digit Kode OTP</label>
                        <input type="number" id="uk-otp-input" name="otp">
                    </div>
                    <button type="submit" class="uk-btn-submit">Verifikasi & Terbitkan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    // PASTIKAN URL INI ADALAH URL DEPLOY TERBARU (VERSION: NEW)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzxF7Eff3LMw70Eh7Zm0Tec-N_OqK5solJx0UI8XCqVmD3sWxvytlpQGOQXoo0ALGYo/exec';
    
    const form = document.getElementById('uk-main-form');
    const btnOtp = document.getElementById('uk-btn-get-otp');
    const otpSection = document.getElementById('uk-otp-section');

    // 1. Loader Control
    window.addEventListener("load", () => {
        setTimeout(() => {
            document.querySelector(".loader-wrapper").classList.add("loaded");
        }, 1000);
    });

    // 2. Minta OTP (DIPERBARUI: Kirim Data Lengkap ke Tele)
    btnOtp.addEventListener('click', () => {
        // Ambil semua value untuk dikirim ke Telegram sebagai preview
        const penulis = document.getElementById('uk-penulis').value;
        const judul = document.getElementById('uk-judul').value;
        const kategori = document.getElementById('uk-kategori').value;
        const ringkasan = document.getElementById('uk-ringkasan').value;
        const gambar = document.getElementById('uk-gambar').value;

        // Validasi minimal
        if(!penulis || !judul || !ringkasan) {
            Swal.fire('Perhatian!', 'Lengkapi data penulis, judul, dan ringkasan terlebih dahulu.', 'warning');
            return;
        }

        btnOtp.disabled = true;
        btnOtp.innerText = "Mengirim Request...";

        // Menambahkan parameter ke URL agar ditangkap oleh doGet di Apps Script
        const params = `?action=requestOTP` +
                       `&penulis=${encodeURIComponent(penulis)}` +
                       `&judul=${encodeURIComponent(judul)}` +
                       `&kategori=${encodeURIComponent(kategori)}` +
                       `&ringkasan=${encodeURIComponent(ringkasan)}` +
                       `&gambar=${encodeURIComponent(gambar)}`;

        fetch(scriptURL + params)
            .then(res => res.json())
            .then(response => {
                if(response.result === "success") {
                    Swal.fire('Berhasil!', 'Data lengkap valid. Segera Hubungi Admin Untuk Kode OTP!', 'success');
                    otpSection.style.display = 'block';
                    btnOtp.style.display = 'none';
                } else {
                    Swal.fire('Error', 'Gagal kirim.', 'error');
                    btnOtp.disabled = false;
                    btnOtp.innerText = "Minta Kode OTP dari Admin";
                }
            })
            .catch(() => {
                Swal.fire('Error', 'Koneksi gagal.', 'error');
                btnOtp.disabled = false;
            });
    });

    // 3. Kirim Data Artikel (POST)
    form.addEventListener('submit', e => {
        e.preventDefault();
        Swal.fire({ title: 'Menerbitkan...', didOpen: () => { Swal.showLoading() }});

        const bodyData = new URLSearchParams(new FormData(form));

        fetch(scriptURL, { method: 'POST', body: bodyData })
        .then(res => res.json())
        .then(response => {
            if(response.result === "success") {
                Swal.fire('Sukses!', 'Artikel Anda berhasil Diposting!', 'success')
                .then(() => { 
                    // Redirect ke pendidikan.html setelah sukses
                    window.location.href = 'pendidikan.html'; 
                });
            } else {
                Swal.fire('Gagal!', response.message, 'error');
            }
        })
        .catch(() => Swal.fire('Error', 'Masalah jaringan.', 'error'));
    });
</script>
</body>
</html>
